<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>War Map</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="map-container">
  <div id="stats-box">
    <div class="stats-title">Joueurs en ligne</div>

    <div class="stats-total">
        Total : <span id="total">0</span>
    </div>

    <div class="stats-factions">
        <div>Empire Chimérique : <span id="chim">0</span></div>
        <div>Squ'bai : <span id="illu">0</span></div>
        <div>Saint Empire d'Aéris : <span id="aeris">0</span></div>
        <div>Culte de Elle : <span id="culte">0</span></div>
        <div>Alliance Architecte : <span id="archis">0</span></div>
    </div>
</div>

<img src="galaxy.png" id="galaxy-map">

<div id="sectors-layer"></div>
<div id="faction-borders"></div>
<div id="planets-layer"></div>
<div id="ui-layer"></div>

</div>

<script src="https://d3js.org/d3-delaunay.v6.min.js"></script>
<script src="script.js"></script>

</body>
</html>
